# =============================================================================
# SecretAI Docker Compose — RYTN (SGLang)
# SGLang latest | Caddy v0.1.18 | LiteLLM router
# Models: gemma4:31b + qwq:32b + qwen3-vl:32b (bitsandbytes int4)
#
# Architecture:
#   Caddy :21434 -> LiteLLM :4000 --> sglang-gemma   :8000  (gemma4:31b)
#                                 --> sglang-qwq      :8001  (qwq:32b)
#                                 --> sglang-qwen3vl  :8002  (qwen3-vl:32b)
#
# SGLang vs vLLM:
#   + RadixAttention: KV cache reuse across requests with shared prefixes
#   + Better throughput for multi-turn chat (common prefix cached)
#   + Faster TTFT on repeated system prompts
#   - bitsandbytes support less tested than in vLLM
#
# Per-model notes (from docs/model cards):
#   gemma4:31b   Multimodal arch → requires triton attention backend + no cuda-graph
#   qwq:32b      Standard text model, no special flags needed
#   qwen3-vl:32b VLM, max_pixels=1048576 (1024×1024) limits image memory
#
# VRAM budget H100 80GB:
#   gemma4:31b   bitsandbytes int4 ~16GB + KV -> 22.4GB (28% alloc)
#   qwq:32b      bitsandbytes int4 ~16GB + KV -> 22.4GB (28% alloc)
#   qwen3-vl:32b bitsandbytes int4 ~16GB + KV -> 22.4GB (28% alloc)
#   STT (Whisper large-v3)                    ~  3GB
#   TTS (Kokoro)                              ~  2GB
#   -----------------------------------------
#   Total                                     ~72GB < 80GB
#
# Port 18800 (TGI Solidity LLM) is a separate deployment; Caddy routes only.
# =============================================================================

services:

  init:
    image: alpine:3.23.4
    container_name: sys-init
    volumes:
      - /mnt/secure:/workdir
    command: >
      sh -c "
        mkdir -p /workdir/stt-models &&
        mkdir -p /workdir/stt-logs &&
        mkdir -p /workdir/tts-data/hf &&
        mkdir -p /workdir/tts-data/cache &&
        mkdir -p /workdir/tts-models &&
        mkdir -p /workdir/tts-logs &&
        mkdir -p /workdir/.sglang-gemma &&
        mkdir -p /workdir/.sglang-qwq &&
        mkdir -p /workdir/.sglang-qwen3vl &&
        mkdir -p /workdir/caddy-data &&
        chmod -R 777 /workdir/tts-logs /workdir/tts-models /workdir/tts-data /workdir/stt-logs /workdir/stt-models
      "
    restart: "no"
    networks:
      - secretai_network

  caddy:
    image: ghcr.io/scrtlabs/secret-ai-caddy:v0.1.18
    container_name: caddy-proxy
    ports:
      - "21434:21434"
      - "25436:25436"
      - "25435:25435"
      - "18800:18800"
    volumes:
      - /mnt/secure/app_cert:/etc/ssl/certs:ro
      - /mnt/secure/app_cert:/etc/ssl/private:ro
      - /mnt/secure/caddy-data:/data
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    env_file:
      - usr/.env
    environment:
      - SKIP_SSL_VALIDATION=true
      - SECRET_CHAIN_ID=secret-4
      - SECRET_CONTRACT=secret18xpp2kmkk7g8xzx24wm5zstw9tjv6g3xle2vjm
      - METERING=1
      - METERING_INTERVAL=1m
      - METERING_URL=https://secretai.scrtlabs.com
    healthcheck:
      test: ["CMD", "curl", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    user: root
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - secretai_network

  # ── LiteLLM router: single OpenAI-compatible endpoint for all models ────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-router
    command: ["--config", "/etc/litellm/config.yaml", "--port", "4000", "--num_workers", "4"]
    configs:
      - source: litellm_config
        target: /etc/litellm/config.yaml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/liveliness"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - secretai_network
    depends_on:
      - sglang-gemma
      - sglang-qwq
      - sglang-qwen3vl

  # ── SGLang: gemma4:31b ────────────────────────────────────────────────────
  # HF model: google/gemma-4-31B-it
  sglang-gemma:
    image: lmsysorg/sglang:latest
    container_name: sglang-gemma
    privileged: true
    runtime: nvidia
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          memory: 60G
    env_file:
      - usr/.env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HF_HOME=/root/.cache/huggingface
    volumes:
      - /mnt/secure/.sglang-gemma:/root/.cache/huggingface
    command: >
      python -m sglang.launch_server
      --model-path google/gemma-4-31B-it
      --served-model-name gemma4:31b
      --host 0.0.0.0
      --port 8000
      --tp 1
      --mem-fraction-static 0.28
      --quantization bitsandbytes
      --kv-cache-dtype fp8_e4m3
      --attention-backend triton
      --disable-cuda-graph
      --chunked-prefill-size -1
      --enable-metrics
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 120s
      start_period: 600s
      retries: 20
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    networks:
      - secretai_network

  # ── SGLang: qwq:32b ───────────────────────────────────────────────────────
  # HF model: Qwen/QwQ-32B
  sglang-qwq:
    image: lmsysorg/sglang:latest
    container_name: sglang-qwq
    privileged: true
    runtime: nvidia
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          memory: 60G
    env_file:
      - usr/.env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HF_HOME=/root/.cache/huggingface
    volumes:
      - /mnt/secure/.sglang-qwq:/root/.cache/huggingface
    command: >
      python -m sglang.launch_server
      --model-path Qwen/QwQ-32B
      --served-model-name qwq:32b
      --host 0.0.0.0
      --port 8001
      --tp 1
      --mem-fraction-static 0.28
      --quantization bitsandbytes
      --kv-cache-dtype fp8_e4m3
      --chunked-prefill-size 4096
      --enable-metrics
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 120s
      start_period: 600s
      retries: 20
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    networks:
      - secretai_network

  # ── SGLang: qwen3-vl:32b (Vision Language Model) ─────────────────────────
  # HF model: Qwen/Qwen3-VL-32B-Instruct
  sglang-qwen3vl:
    image: lmsysorg/sglang:latest
    container_name: sglang-qwen3vl
    privileged: true
    runtime: nvidia
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          memory: 60G
    env_file:
      - usr/.env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HF_HOME=/root/.cache/huggingface
    volumes:
      - /mnt/secure/.sglang-qwen3vl:/root/.cache/huggingface
    command: >
      python -m sglang.launch_server
      --model-path Qwen/Qwen3-VL-32B-Instruct
      --served-model-name qwen3-vl:32b
      --host 0.0.0.0
      --port 8002
      --tp 1
      --mem-fraction-static 0.28
      --quantization bitsandbytes
      --kv-cache-dtype fp8_e4m3
      --chunked-prefill-size 4096
      --mm-process-config '{"image":{"max_pixels":1048576}}'
      --enable-metrics
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 120s
      start_period: 600s
      retries: 20
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    networks:
      - secretai_network

  stt_service:
    image: ghcr.io/scrtlabs/secret-ai-stt-tts:v0.0.8
    container_name: secretai-stt-service
    privileged: true
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - WHISPER_MODEL=large-v3
      - WHISPER_COMPUTE_TYPE=float16
      - WHISPER_DEVICE=cuda
      - CHUNK_DURATION=2.0
      - SAMPLE_RATE=16000
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
        limits:
          memory: 4G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - /mnt/secure/stt-models:/app/models
      - /mnt/secure/stt-logs:/app/logs
    networks:
      - secretai_network
    labels:
      - "com.secretai.service=stt"
      - "com.secretai.version=1.1.0"
    depends_on:
      init:
        condition: service_completed_successfully

  tts_service:
    image: ghcr.io/remsky/kokoro-fastapi-gpu:latest
    container_name: secretai-kokoro-tts
    restart: unless-stopped
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      HF_HOME: /data/hf
      TRANSFORMERS_CACHE: /data/hf/transformers
      XDG_CACHE_HOME: /data/.cache
      PORT: "8880"
      PYTHONUNBUFFERED: "1"
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
        limits:
          memory: 4G
    volumes:
      - /mnt/secure/tts-data/hf:/data/hf
      - /mnt/secure/tts-data/cache:/data/.cache
      - /mnt/secure/tts-models:/models
      - /mnt/secure/tts-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8880/v1/test"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - secretai_network
    labels:
      - "com.secretai.service=tts"
      - "com.secretai.provider=kokoro"
    depends_on:
      init:
        condition: service_completed_successfully

networks:
  secretai_network:
    driver: bridge
    name: secretai_network

configs:
  litellm_config:
    content: |
      model_list:
        - model_name: gemma4:31b
          litellm_params:
            model: openai/gemma4:31b
            api_base: http://sglang-gemma:8000/v1
            api_key: "dummy"
        - model_name: qwq:32b
          litellm_params:
            model: openai/qwq:32b
            api_base: http://sglang-qwq:8001/v1
            api_key: "dummy"
        - model_name: qwen3-vl:32b
          litellm_params:
            model: openai/qwen3-vl:32b
            api_base: http://sglang-qwen3vl:8002/v1
            api_key: "dummy"

      litellm_settings:
        drop_params: true
        set_verbose: false
        request_timeout: 600

  caddyfile:
    content: |
      {
        order secret_reverse_proxy first
        log {
          output stdout
          format console
          level INFO
        }
      }

      :21434 {
        tls /etc/ssl/certs/secret_vm_app_fullchain.pem /etc/ssl/private/secret_vm_app_private.pem

        @cors_preflight method OPTIONS
        handle @cors_preflight {
          @has_origin header Origin *
          header @has_origin {
            Access-Control-Allow-Origin {header.origin}
            Access-Control-Allow-Credentials "true"
            Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD"
            Access-Control-Allow-Headers "*"
            Access-Control-Max-Age "86400"
            Vary "Origin"
          }
          respond "" 204
        }

        handle {
          @has_origin header Origin *
          header @has_origin {
            Access-Control-Allow-Origin {header.origin}
            Access-Control-Allow-Credentials "true"
            Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD"
            Access-Control-Allow-Headers "*"
            Access-Control-Expose-Headers "*"
            Vary "Origin"
          }

          secret_reverse_proxy {
            API_MASTER_KEY {env.SECRET_API_MASTER_KEY}
            secret_node {env.SECRET_NODE}
            contract_address {env.SECRET_CONTRACT}
            secret_chain_id {env.SECRET_CHAIN_ID}
            metering {env.METERING}
            metering_interval {env.METERING_INTERVAL}
            metering_url {env.METERING_URL}
            max_body_size 2097152
            token_counting_mode accurate
            max_retries 5
            retry_backoff 300s
            enable_metrics true
            metrics_path /metrics
            x402_enabled {env.X402_ENABLED}
            devportal_url {env.DEVPORTAL_URL}
            devportal_service_key {env.DEVPORTAL_SERVICE_KEY}
            x402_min_balance_usd {env.X402_MIN_BALANCE_USD}
          }

          reverse_proxy litellm-router:4000 {
            health_uri /health/liveliness
            health_interval 30s
            health_timeout 10s
            header_up Host {host}
            header_up X-Real-IP {remote_host}
            header_up X-Forwarded-Port {server_port}
            header_up X-Forwarded-Proto {scheme}
            header_up X-Forwarded-For {remote_host}
          }
        }

        header {
          -Server
          X-Content-Type-Options nosniff
          X-Frame-Options SAMEORIGIN
          X-XSS-Protection "1; mode=block"
          Referrer-Policy strict-origin-when-cross-origin
        }

        handle_errors {
          @502 expression {http.error.status_code} == 502
          @503 expression {http.error.status_code} == 503
          @504 expression {http.error.status_code} == 504
          respond @502 "LLM service temporarily unavailable" 502
          respond @503 "Service temporarily unavailable" 503
          respond @504 "Request timeout" 504
        }
      }

      :25436 {
        tls /etc/ssl/certs/secret_vm_app_fullchain.pem /etc/ssl/private/secret_vm_app_private.pem

        @cors_preflight method OPTIONS
        handle @cors_preflight {
          @has_origin header Origin *
          header @has_origin {
            Access-Control-Allow-Origin {header.origin}
            Access-Control-Allow-Credentials "true"
            Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD"
            Access-Control-Allow-Headers "*"
            Access-Control-Max-Age "86400"
            Vary "Origin"
          }
          respond "" 204
        }

        handle {
          @has_origin header Origin *
          header @has_origin {
            Access-Control-Allow-Origin {header.origin}
            Access-Control-Allow-Credentials "true"
            Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD"
            Access-Control-Allow-Headers "*"
            Access-Control-Expose-Headers "*"
            Vary "Origin"
          }

          secret_reverse_proxy {
            API_MASTER_KEY {env.SECRET_API_MASTER_KEY}
            secret_node {env.SECRET_NODE}
            contract_address {env.SECRET_CONTRACT}
            secret_chain_id {env.SECRET_CHAIN_ID}
            metering {env.METERING}
            metering_interval {env.METERING_INTERVAL}
            metering_url {env.METERING_URL}
            max_body_size 104857600
            token_counting_mode heuristic
            max_retries 5
            retry_backoff 300s
            x402_enabled {env.X402_ENABLED}
            devportal_url {env.DEVPORTAL_URL}
            devportal_service_key {env.DEVPORTAL_SERVICE_KEY}
            x402_min_balance_usd {env.X402_MIN_BALANCE_USD}
          }

          reverse_proxy secretai-stt-service:8001 {
            health_uri /healthz
            health_interval 30s
            health_timeout 10s
            header_up Host {host}
            header_up X-Real-IP {remote_host}
            header_up X-Forwarded-Port {server_port}
          }
        }

        handle_errors {
          @502 expression {http.error.status_code} == 502
          @503 expression {http.error.status_code} == 503
          @504 expression {http.error.status_code} == 504
          respond @502 "STT service temporarily unavailable" 502
          respond @503 "Service temporarily unavailable" 503
          respond @504 "Request timeout" 504
        }
      }

      :25435 {
        tls /etc/ssl/certs/secret_vm_app_fullchain.pem /etc/ssl/private/secret_vm_app_private.pem

        @cors_preflight method OPTIONS
        handle @cors_preflight {
          @has_origin header Origin *
          header @has_origin {
            Access-Control-Allow-Origin {header.origin}
            Access-Control-Allow-Credentials "true"
            Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD"
            Access-Control-Allow-Headers "*"
            Access-Control-Max-Age "86400"
            Vary "Origin"
          }
          respond "" 204
        }

        handle {
          @has_origin header Origin *
          header @has_origin {
            Access-Control-Allow-Origin {header.origin}
            Access-Control-Allow-Credentials "true"
            Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD"
            Access-Control-Allow-Headers "*"
            Access-Control-Expose-Headers "*"
            Vary "Origin"
          }

          secret_reverse_proxy {
            API_MASTER_KEY {env.SECRET_API_MASTER_KEY}
            secret_node {env.SECRET_NODE}
            contract_address {env.SECRET_CONTRACT}
            secret_chain_id {env.SECRET_CHAIN_ID}
            metering {env.METERING}
            metering_interval {env.METERING_INTERVAL}
            metering_url {env.METERING_URL}
            max_body_size 2097152
            token_counting_mode heuristic
            max_retries 5
            retry_backoff 300s
            x402_enabled {env.X402_ENABLED}
            devportal_url {env.DEVPORTAL_URL}
            devportal_service_key {env.DEVPORTAL_SERVICE_KEY}
            x402_min_balance_usd {env.X402_MIN_BALANCE_USD}
          }

          reverse_proxy secretai-kokoro-tts:8880 {
            health_uri /v1/test
            health_interval 30s
            health_timeout 10s
            header_up Host {host}
            header_up X-Real-IP {remote_host}
            header_up X-Forwarded-Port {server_port}
          }
        }

        handle_errors {
          @502 expression {http.error.status_code} == 502
          @503 expression {http.error.status_code} == 503
          @504 expression {http.error.status_code} == 504
          respond @502 "TTS service temporarily unavailable" 502
          respond @503 "Service temporarily unavailable" 503
          respond @504 "Request timeout" 504
        }
      }

      https://:18800 {
        tls /etc/ssl/certs/secret_vm_app_fullchain.pem /etc/ssl/private/secret_vm_app_private.pem

        @cors_preflight method OPTIONS
        handle @cors_preflight {
          @has_origin header Origin *
          header @has_origin {
            Access-Control-Allow-Origin {header.origin}
            Access-Control-Allow-Credentials "true"
            Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD"
            Access-Control-Allow-Headers "*"
            Access-Control-Max-Age "86400"
            Vary "Origin"
          }
          respond "" 204
        }

        handle {
          @has_origin header Origin *
          header @has_origin {
            Access-Control-Allow-Origin {header.origin}
            Access-Control-Allow-Credentials "true"
            Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD"
            Access-Control-Allow-Headers "*"
            Access-Control-Expose-Headers "*"
            Vary "Origin"
          }

          secret_reverse_proxy {
            API_MASTER_KEY {env.SECRET_API_MASTER_KEY}
            secret_node {env.SECRET_NODE}
            contract_address {env.SECRET_CONTRACT}
            secret_chain_id {env.SECRET_CHAIN_ID}
            metering {env.METERING}
            metering_interval {env.METERING_INTERVAL}
            metering_url {env.METERING_URL}
            max_body_size 2097152
            token_counting_mode accurate
            max_retries 5
            retry_backoff 300s
            x402_enabled {env.X402_ENABLED}
            devportal_url {env.DEVPORTAL_URL}
            devportal_service_key {env.DEVPORTAL_SERVICE_KEY}
            x402_min_balance_usd {env.X402_MIN_BALANCE_USD}
          }

          route {
            handle_path /generate* {
              reverse_proxy tgi:80
            }
            handle_path /generate_stream* {
              reverse_proxy tgi:80
            }
            handle_path /tokenize* {
              reverse_proxy tgi:80
            }
            handle_path /v1/* {
              reverse_proxy tgi:80
            }
            handle_path /metrics {
              reverse_proxy tgi:80
            }
          }
        }

        handle_errors {
          @502 expression {http.error.status_code} == 502
          @503 expression {http.error.status_code} == 503
          @504 expression {http.error.status_code} == 504
          respond @502 "Solidity LLM (TGI) temporarily unavailable" 502
          respond @503 "Service temporarily unavailable" 503
          respond @504 "Request timeout" 504
        }
      }
