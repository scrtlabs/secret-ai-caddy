# =============================================================================
# SecretAI Docker Compose — RYTN (SGLang)
# SGLang latest | Caddy v0.1.19 | LiteLLM router
# Model: qwen3.6:27b (SGLang, Mamba-hybrid benchmark vs vLLM)
#
# Architecture:
#   Caddy :21434 -> LiteLLM :4000 --> sglang-qwen36 :8001  (qwen3.6:27b)
#
# Purpose: benchmark qwen3.6-27b throughput in SGLang vs vLLM.
#   Qwen3.6-27B (Qwen3_next) is a Mamba-hybrid — SSM layers reduce
#   KV cache pressure; SGLang's RadixAttention (tree prefix cache) and
#   chunked prefill may outperform vLLM on long-context workloads.
#
# IMPORTANT: SGLang forbids colon in --served-model-name (LoRA base:adapter
#   syntax). Clients send "qwen3.6:27b"; LiteLLM maps it to "qwen3.6-27b"
#   which matches the SGLang --served-model-name.
#
# SGLang flag mapping from vLLM:
#   --model                  → --model-path
#   --gpu-memory-utilization → --mem-fraction-static
#   --max-model-len          → --context-length
#   --max-num-batched-tokens → --chunked-prefill-size
#   --max-num-seqs           → --max-running-requests
#   --tensor-parallel-size   → --tp
#   --kv-cache-dtype fp8     → --kv-cache-dtype fp8_e4m3
#   --enable-prefix-caching  → RadixAttention ON by default in SGLang
#
# SGLang-specific flags:
#   --mamba-scheduler-strategy no_buffer — Qwen3.6 Mamba-hybrid V1 strategy,
#                                          lower memory than extra_buffer (V2)
#   --cuda-graph-max-bs-decode 256       — cap decode CUDA graph batch size
#
# VRAM budget H100 80GB:
#   qwen3.6-27b AWQ int4  mem-fraction 0.95  (~14 GiB weights + ~62 GiB KV fp8)
#   Full GPU available since only one model runs.
# =============================================================================

services:

  init:
    image: alpine:3.23.4
    container_name: sys-init
    volumes:
      - /mnt/secure:/workdir
    command: >
      sh -c "
        mkdir -p /workdir/.vllm-qwen36 &&
        mkdir -p /workdir/caddy-data
      "
    restart: "no"
    networks:
      - secretai_network

  caddy:
    image: ghcr.io/scrtlabs/secret-ai-caddy:v0.1.19
    container_name: caddy-proxy
    ports:
      - "21434:21434"
      - "18800:18800"
    volumes:
      - /mnt/secure/app_cert:/etc/ssl/certs:ro
      - /mnt/secure/app_cert:/etc/ssl/private:ro
      - /mnt/secure/caddy-data:/data
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    env_file:
      - usr/.env
    environment:
      - SKIP_SSL_VALIDATION=true
      - SECRET_CHAIN_ID=secret-4
      - SECRET_CONTRACT=secret18xpp2kmkk7g8xzx24wm5zstw9tjv6g3xle2vjm
      - METERING=1
      - METERING_INTERVAL=1m
      - METERING_URL=https://secretai.scrtlabs.com
    healthcheck:
      test: ["CMD", "curl", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    user: root
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - secretai_network

  # ── LiteLLM router ──────────────────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-router
    command: ["--config", "/etc/litellm/config.yaml", "--port", "4000", "--num_workers", "4"]
    configs:
      - source: litellm_config
        target: /etc/litellm/config.yaml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/liveliness"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - secretai_network
    depends_on:
      sglang-qwen36:
        condition: service_healthy

  # ── SGLang: qwen3.6-27b ──────────────────────────────────────────────────
  # Full GPU budget available — mem-fraction-static 0.95 leaves 5% (~4 GiB)
  # for CUDA graphs, PyTorch caching allocator, and driver overhead.
  sglang-qwen36:
    image: lmsysorg/sglang:latest
    container_name: sglang-qwen36
    privileged: true
    runtime: nvidia
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          memory: 60G
    env_file:
      - usr/.env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HF_HOME=/root/.cache/huggingface
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    volumes:
      - /mnt/secure/.vllm-qwen36:/root/.cache/huggingface
    command: >
      python -m sglang.launch_server
      --model-path cyankiwi/Qwen3.6-27B-AWQ-INT4
      --served-model-name qwen3.6-27b
      --host 0.0.0.0
      --port 8001
      --tp 1
      --dtype bfloat16
      --quantization compressed-tensors
      --kv-cache-dtype fp8_e4m3
      --mem-fraction-static 0.95
      --context-length 131072
      --chunked-prefill-size 8192
      --max-running-requests 256
      --mamba-scheduler-strategy no_buffer
      --cuda-graph-max-bs-decode 256
      --enable-metrics
      --trust-remote-code
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 120s
      start_period: 600s
      retries: 20
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    networks:
      - secretai_network

networks:
  secretai_network:
    driver: bridge
    name: secretai_network

configs:
  litellm_config:
    content: |
      model_list:
        # clients send "qwen3.6:27b" — LiteLLM maps to "qwen3.6-27b" (SGLang LoRA restriction)
        - model_name: qwen3.6:27b
          litellm_params:
            model: openai/qwen3.6-27b
            api_base: http://sglang-qwen36:8001/v1
            api_key: "dummy"

      litellm_settings:
        drop_params: true
        set_verbose: false
        request_timeout: 600

  caddyfile:
    content: |
      {
        order secret_reverse_proxy first
        log {
          output stdout
          format console
          level INFO
        }
      }

      :21434 {
        tls /etc/ssl/certs/secret_vm_app_fullchain.pem /etc/ssl/private/secret_vm_app_private.pem

        @cors_preflight method OPTIONS
        handle @cors_preflight {
          @has_origin header Origin *
          header @has_origin {
            Access-Control-Allow-Origin {header.origin}
            Access-Control-Allow-Credentials "true"
            Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD"
            Access-Control-Allow-Headers "*"
            Access-Control-Max-Age "86400"
            Vary "Origin"
          }
          respond "" 204
        }

        handle {
          @has_origin header Origin *
          header @has_origin {
            Access-Control-Allow-Origin {header.origin}
            Access-Control-Allow-Credentials "true"
            Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD"
            Access-Control-Allow-Headers "*"
            Access-Control-Expose-Headers "*"
            Vary "Origin"
          }

          secret_reverse_proxy {
            API_MASTER_KEY {env.SECRET_API_MASTER_KEY}
            secret_node {env.SECRET_NODE}
            contract_address {env.SECRET_CONTRACT}
            secret_chain_id {env.SECRET_CHAIN_ID}
            metering {env.METERING}
            metering_interval {env.METERING_INTERVAL}
            metering_url {env.METERING_URL}
            max_body_size 2097152
            token_counting_mode accurate
            max_retries 5
            retry_backoff 300s
            enable_metrics true
            metrics_path /metrics
            x402_enabled {env.X402_ENABLED}
            devportal_url {env.DEVPORTAL_URL}
            devportal_service_key {env.DEVPORTAL_SERVICE_KEY}
            x402_min_balance_usd {env.X402_MIN_BALANCE_USD}
          }

          reverse_proxy litellm-router:4000 {
            health_uri /health/liveliness
            health_interval 30s
            health_timeout 10s
            header_up Host {host}
            header_up X-Real-IP {remote_host}
            header_up X-Forwarded-Port {server_port}
            header_up X-Forwarded-Proto {scheme}
            header_up X-Forwarded-For {remote_host}
          }
        }

        header {
          -Server
          X-Content-Type-Options nosniff
          X-Frame-Options SAMEORIGIN
          X-XSS-Protection "1; mode=block"
          Referrer-Policy strict-origin-when-cross-origin
        }

        handle_errors {
          @502 expression {http.error.status_code} == 502
          @503 expression {http.error.status_code} == 503
          @504 expression {http.error.status_code} == 504
          respond @502 "LLM service temporarily unavailable" 502
          respond @503 "Service temporarily unavailable" 503
          respond @504 "Request timeout" 504
        }
      }

      https://:18800 {
        tls /etc/ssl/certs/secret_vm_app_fullchain.pem /etc/ssl/private/secret_vm_app_private.pem

        @cors_preflight method OPTIONS
        handle @cors_preflight {
          @has_origin header Origin *
          header @has_origin {
            Access-Control-Allow-Origin {header.origin}
            Access-Control-Allow-Credentials "true"
            Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD"
            Access-Control-Allow-Headers "*"
            Access-Control-Max-Age "86400"
            Vary "Origin"
          }
          respond "" 204
        }

        handle {
          @has_origin header Origin *
          header @has_origin {
            Access-Control-Allow-Origin {header.origin}
            Access-Control-Allow-Credentials "true"
            Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD"
            Access-Control-Allow-Headers "*"
            Access-Control-Expose-Headers "*"
            Vary "Origin"
          }

          secret_reverse_proxy {
            API_MASTER_KEY {env.SECRET_API_MASTER_KEY}
            secret_node {env.SECRET_NODE}
            contract_address {env.SECRET_CONTRACT}
            secret_chain_id {env.SECRET_CHAIN_ID}
            metering {env.METERING}
            metering_interval {env.METERING_INTERVAL}
            metering_url {env.METERING_URL}
            max_body_size 2097152
            token_counting_mode accurate
            max_retries 5
            retry_backoff 300s
            x402_enabled {env.X402_ENABLED}
            devportal_url {env.DEVPORTAL_URL}
            devportal_service_key {env.DEVPORTAL_SERVICE_KEY}
            x402_min_balance_usd {env.X402_MIN_BALANCE_USD}
          }

          route {
            handle_path /generate* {
              reverse_proxy tgi:80
            }
            handle_path /generate_stream* {
              reverse_proxy tgi:80
            }
            handle_path /tokenize* {
              reverse_proxy tgi:80
            }
            handle_path /v1/* {
              reverse_proxy tgi:80
            }
            handle_path /metrics {
              reverse_proxy tgi:80
            }
          }
        }

        handle_errors {
          @502 expression {http.error.status_code} == 502
          @503 expression {http.error.status_code} == 503
          @504 expression {http.error.status_code} == 504
          respond @502 "Solidity LLM (TGI) temporarily unavailable" 502
          respond @503 "Service temporarily unavailable" 503
          respond @504 "Request timeout" 504
        }
      }
