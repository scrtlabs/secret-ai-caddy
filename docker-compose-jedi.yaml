# =============================================================================
# SecretAI Docker Compose — JEDI (gpt-oss:120b)
# vLLM v0.23.0 | Caddy v0.1.18 | LiteLLM router
#
# Architecture:
#   Caddy :21434 -> LiteLLM :4000 --> vllm-llm :8000  (gpt-oss:120b)
#
# Protection layers:
#   1. LiteLLM max_parallel_requests 50 — 429 when exceeded
#   2. LiteLLM circuit breaker — pauses model 60s after 3 consecutive failures
#   3. vLLM --max-num-seqs 50, --max-model-len 32768 — scheduler + KV cap
#   4. gpu-watchdog — monitors GPU util/temp, exposes /gpu-status endpoint
#   5. Caddy max_retries 2 / retry_backoff 30s (metering retries only)
# =============================================================================

services:

  init:
    image: alpine:3.23.4
    container_name: sys-init
    volumes:
      - /mnt/secure:/workdir
    command: >
      sh -c "
        mkdir -p /workdir/.vllm &&
        mkdir -p /workdir/caddy-data
      "
    restart: "no"
    networks:
      - secretai_network

  caddy:
    image: ghcr.io/scrtlabs/secret-ai-caddy:v0.1.18
    container_name: caddy-proxy
    ports:
      - "21434:21434"
    volumes:
      - /mnt/secure/app_cert:/etc/ssl/certs:ro
      - /mnt/secure/app_cert:/etc/ssl/private:ro
      - /mnt/secure/caddy-data:/data
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    env_file:
      - usr/.env
    environment:
      - SKIP_SSL_VALIDATION=true
      - SECRET_CHAIN_ID=secret-4
      - SECRET_CONTRACT=secret18xpp2kmkk7g8xzx24wm5zstw9tjv6g3xle2vjm
      - METERING=1
      - METERING_INTERVAL=1m
      - METERING_URL=https://secretai.scrtlabs.com
    healthcheck:
      test: ["CMD", "curl", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    user: root
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - secretai_network
    depends_on:
      litellm:
        condition: service_healthy

  # ── LiteLLM router ───────────────────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-router
    command: ["--config", "/etc/litellm/config.yaml", "--port", "4000", "--num_workers", "4"]
    configs:
      - source: litellm_config
        target: /etc/litellm/config.yaml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/liveliness"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - secretai_network
    depends_on:
      vllm:
        condition: service_healthy

  # ── GPU Watchdog ──────────────────────────────────────────────────────────
  # Monitors GPU utilization, temperature, memory via nvidia-smi every 5s.
  # Exposes JSON status at :9090/gpu-status — Caddy proxies it to /gpu-status.
  # Logs CRITICAL when GPU util >92% sustained for 120+ seconds.
  gpu-watchdog:
    image: nvcr.io/nvidia/cuda:12.4.1-base-ubuntu22.04
    container_name: gpu-watchdog
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=utility
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - secretai_network
    command:
      - bash
      - -c
      - |
        apt-get install -y python3 -qq 2>/dev/null
        cat > /tmp/watchdog.py << 'PYEOF'
        import subprocess, json, time, threading, datetime
        from http.server import HTTPServer, BaseHTTPRequestHandler
        from collections import deque

        # 24 samples × 5s = 120s sliding window
        history = deque(maxlen=24)
        gpu = {}
        critical = False

        def poll():
            global gpu, critical
            while True:
                try:
                    r = subprocess.run(
                        ["nvidia-smi",
                         "--query-gpu=utilization.gpu,memory.used,memory.total,temperature.gpu,power.draw",
                         "--format=csv,noheader,nounits"],
                        capture_output=True, text=True, timeout=5
                    )
                    p = [x.strip() for x in r.stdout.strip().split(",")]
                    util = int(p[0])
                    mem_used = int(p[1])
                    mem_total = int(p[2])
                    gpu = {
                        "util_pct": util,
                        "memory_used_mb": mem_used,
                        "memory_total_mb": mem_total,
                        "memory_used_pct": round(mem_used / mem_total * 100),
                        "temp_c": int(p[3]),
                        "power_w": round(float(p[4]), 1),
                    }
                    history.append(util > 92)
                    overload_score = sum(history)
                    critical = len(history) >= 24 and overload_score >= 22
                    if critical:
                        ts = datetime.datetime.utcnow().isoformat()
                        print(f"[{ts}] CRITICAL: sustained GPU overload "
                              f"util={util}% temp={gpu['temp_c']}C "
                              f"score={overload_score}/24", flush=True)
                except Exception as e:
                    print(f"[watchdog] error: {e}", flush=True)
                time.sleep(5)

        class Handler(BaseHTTPRequestHandler):
            def do_GET(self):
                if self.path != "/gpu-status":
                    self.send_response(404)
                    self.end_headers()
                    return
                body = json.dumps({
                    **gpu,
                    "sustained_overload": critical,
                    "overload_score": sum(history),
                    "overload_threshold": 24,
                    "timestamp": datetime.datetime.utcnow().isoformat() + "Z",
                }, indent=2).encode()
                self.send_response(200)
                self.send_header("Content-Type", "application/json")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)
            def log_message(self, *a):
                pass

        threading.Thread(target=poll, daemon=True).start()
        print("[watchdog] started on :9090/gpu-status", flush=True)
        HTTPServer(("0.0.0.0", 9090), Handler).serve_forever()
        PYEOF
        exec python3 /tmp/watchdog.py

  # ── vLLM: gpt-oss:120b ───────────────────────────────────────────────────
  vllm:
    image: vllm/vllm-openai:v0.23.0
    container_name: vllm-llm
    privileged: true
    runtime: nvidia
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          memory: 160G
    env_file:
      - usr/.env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HF_HOME=/root/.cache/huggingface
    volumes:
      - /mnt/secure/.vllm:/root/.cache/huggingface
    command: >
      --model openai/gpt-oss-120b
      --served-model-name gpt-oss:120b
      --host 0.0.0.0
      --port 8000
      --tensor-parallel-size 1
      --gpu-memory-utilization 0.95
      --kv-cache-dtype fp8
      --no-enable-prefix-caching
      --max-num-batched-tokens 16384
      --max-model-len 32768
      --max-num-seqs 50
      --tool-call-parser openai
      --enable-auto-tool-choice
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 120s
      start_period: 600s
      retries: 20
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    networks:
      - secretai_network

networks:
  secretai_network:
    driver: bridge

configs:
  litellm_config:
    content: |
      model_list:
        - model_name: gpt-oss:120b
          litellm_params:
            model: openai/gpt-oss:120b
            api_base: http://vllm:8000/v1
            api_key: "dummy"
            max_parallel_requests: 50

      router_settings:
        allowed_fails: 3
        cooldown_time: 60
        num_retries: 0

      litellm_settings:
        drop_params: true
        set_verbose: false
        request_timeout: 600

  caddyfile:
    content: |
      {
        order secret_reverse_proxy first
        log {
          output stdout
          format console
          level INFO
        }
      }

      :21434 {
        tls /etc/ssl/certs/secret_vm_app_fullchain.pem /etc/ssl/private/secret_vm_app_private.pem

        # GPU status — public, no auth required
        handle /gpu-status {
          reverse_proxy gpu-watchdog:9090
        }

        @cors_preflight method OPTIONS
        handle @cors_preflight {
          @has_origin header Origin *
          header @has_origin {
            Access-Control-Allow-Origin {header.origin}
            Access-Control-Allow-Credentials "true"
            Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD"
            Access-Control-Allow-Headers "*"
            Access-Control-Max-Age "86400"
            Vary "Origin"
          }
          respond "" 204
        }

        handle {
          @has_origin header Origin *
          header @has_origin {
            Access-Control-Allow-Origin {header.origin}
            Access-Control-Allow-Credentials "true"
            Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD"
            Access-Control-Allow-Headers "*"
            Access-Control-Expose-Headers "*"
            Vary "Origin"
          }

          secret_reverse_proxy {
            API_MASTER_KEY {env.SECRET_API_MASTER_KEY}
            secret_node {env.SECRET_NODE}
            contract_address {env.SECRET_CONTRACT}
            secret_chain_id {env.SECRET_CHAIN_ID}
            metering {env.METERING}
            metering_interval {env.METERING_INTERVAL}
            metering_url {env.METERING_URL}
            max_body_size 2097152
            token_counting_mode accurate
            max_retries 2
            retry_backoff 30s
            enable_metrics true
            metrics_path /metrics
            x402_enabled {env.X402_ENABLED}
            devportal_url {env.DEVPORTAL_URL}
            devportal_service_key {env.DEVPORTAL_SERVICE_KEY}
            x402_min_balance_usd {env.X402_MIN_BALANCE_USD}
          }

          reverse_proxy litellm-router:4000 {
            health_uri /health/liveliness
            health_interval 30s
            health_timeout 10s
            header_up Host {host}
            header_up X-Real-IP {remote_host}
            header_up X-Forwarded-Port {server_port}
            header_up X-Forwarded-Proto {scheme}
            header_up X-Forwarded-For {remote_host}
          }
        }

        header {
          -Server
          X-Content-Type-Options nosniff
          X-Frame-Options SAMEORIGIN
          X-XSS-Protection "1; mode=block"
          Referrer-Policy strict-origin-when-cross-origin
        }

        handle_errors {
          @502 expression {http.error.status_code} == 502
          @503 expression {http.error.status_code} == 503
          @504 expression {http.error.status_code} == 504
          respond @502 "LLM service temporarily unavailable" 502
          respond @503 "Service temporarily unavailable" 503
          respond @504 "Request timeout" 504
        }
      }
