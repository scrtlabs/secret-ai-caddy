# =============================================================================
# SecretAI Docker Compose — RYTN (vLLM)
# vLLM v0.23.0 | Caddy v0.1.19 | LiteLLM router
# Models: gemma4:31b + qwen3.6:27b (AWQ / bitsandbytes int4)
#
# Architecture:
#   Caddy :21434 -> LiteLLM :4000 --> vllm-gemma  :8000  (gemma4:31b)
#                                 --> vllm-qwen36  :8001  (qwen3.6:27b)
#
# VRAM budget H100 80GB (79.18 GiB usable):
#   gemma4:31b   AWQ compressed-tensors 20.2GB weights + 7.9GB KV fp8  = ~29GB physical (42% alloc)
#   qwen3.6:27b  AWQ int4 (cyankiwi)    19.2GB weights + ~14GB KV fp8  = ~37GB physical (47% alloc)
#   -----------------------------------------
#   Total                                                               ~71GB < 79.18GB ✓
#
# qwen3.6:27b max_model_len=32768 (Mamba block=1568 tok; prefix cache requires >1568 tok shared prefix)
#
# Prefix caching enabled on both models (--enable-prefix-caching).
# Models start sequentially to avoid GPU memory profiling conflicts.
#
# Port 18800 (TGI Solidity LLM) is a separate deployment; Caddy routes only.
#
# Protection layers:
#   1. LiteLLM max_parallel_requests — 429 when limit exceeded (gemma4:10, qwen36:50)
#   2. LiteLLM circuit breaker — pauses model 60s after 3 consecutive failures
#   3. vLLM --max-num-seqs — caps scheduler concurrency (gemma4:10, qwen36:50)
#   4. gpu-watchdog — monitors GPU util/temp, exposes /gpu-status endpoint
#   5. Caddy max_retries 2 / retry_backoff 30s (metering retries only)
# =============================================================================

services:

  init:
    image: alpine@sha256:4d889c14e7d5a73929ab00be2ef8ff22437e7cbc545931e52554a7b00e123d8b
    container_name: sys-init
    volumes:
      - /mnt/secure:/workdir
    command: >
      sh -c "
        mkdir -p /workdir/.vllm-gemma &&
        mkdir -p /workdir/.vllm-qwen36 &&
        mkdir -p /workdir/caddy-data
      "
    restart: "no"
    networks:
      - secretai_network

  caddy:
    image: ghcr.io/scrtlabs/secret-ai-caddy@sha256:52c9754026680601c4d41ac495302a01ed879437271c5e173649bf96562258e9
    container_name: caddy-proxy
    ports:
      - "21434:21434"
      - "18800:18800"
    volumes:
      - /mnt/secure/app_cert:/etc/ssl/certs:ro
      - /mnt/secure/app_cert:/etc/ssl/private:ro
      - /mnt/secure/caddy-data:/data
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    env_file:
      - usr/.env
    environment:
      - SKIP_SSL_VALIDATION=true
      - SECRET_CHAIN_ID=secret-4
      - SECRET_CONTRACT=secret18xpp2kmkk7g8xzx24wm5zstw9tjv6g3xle2vjm
      - METERING=1
      - METERING_INTERVAL=1m
      - METERING_URL=https://secretai.scrtlabs.com
    healthcheck:
      test: ["CMD", "curl", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    user: root
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - secretai_network

  # ── LiteLLM router ───────────────────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm@sha256:64b0c74045c506ce62b3b53e0bc90ec717044285eef59bf015562644c316f159
    container_name: litellm-router
    command: ["--config", "/etc/litellm/config.yaml", "--port", "4000", "--num_workers", "4"]
    configs:
      - source: litellm_config
        target: /etc/litellm/config.yaml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/liveliness"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - secretai_network
    depends_on:
      vllm-gemma:
        condition: service_healthy
      vllm-qwen36:
        condition: service_healthy

  # ── GPU Watchdog ──────────────────────────────────────────────────────────
  # Monitors GPU utilization, temperature, memory via nvidia-smi every 5s.
  # Exposes JSON status at :9090/gpu-status — Caddy proxies it to /gpu-status.
  # Logs CRITICAL when GPU util >92% sustained for 120+ seconds.
  gpu-watchdog:
    image: python@sha256:506f2951c04925a2a98fc0604e0e0a3ffd2788cc4aed0eb77c3517c98ac651c0
    container_name: gpu-watchdog
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=utility
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - secretai_network
    command:
      - bash
      - -c
      - |
        cat > /tmp/watchdog.py << 'PYEOF'
        import subprocess, json, time, threading, datetime
        from http.server import HTTPServer, BaseHTTPRequestHandler
        from collections import deque

        # 24 samples × 5s = 120s sliding window; threshold: >83°C (H100 throttle point)
        history = deque(maxlen=24)
        gpu = {}
        critical = False

        def _int(v, default=0):
            try: return int(v)
            except: return default

        def _float(v, default=0.0):
            try: return float(v)
            except: return default

        def poll():
            global gpu, critical
            while True:
                try:
                    r = subprocess.run(
                        ["nvidia-smi",
                         "--query-gpu=utilization.gpu,memory.used,memory.total,temperature.gpu,power.draw",
                         "--format=csv,noheader,nounits"],
                        capture_output=True, text=True, timeout=5
                    )
                    if r.returncode != 0:
                        print(f"[watchdog] nvidia-smi error: {r.stderr.strip()}", flush=True)
                        time.sleep(5)
                        continue
                    p = [x.strip() for x in r.stdout.strip().split(",")]
                    util = _int(p[0])
                    mem_used = _int(p[1])
                    mem_total = _int(p[2]) or 1
                    temp = _int(p[3])
                    power = _float(p[4])
                    gpu = {
                        "util_pct": util,
                        "memory_used_mb": mem_used,
                        "memory_total_mb": mem_total,
                        "memory_used_pct": round(mem_used / mem_total * 100),
                        "temp_c": temp,
                        "power_w": round(power, 1),
                    }
                    history.append(temp > 83)
                    overload_score = sum(history)
                    critical = len(history) >= 24 and overload_score >= 22
                    if critical:
                        ts = datetime.datetime.utcnow().isoformat()
                        print(f"[{ts}] CRITICAL: sustained GPU high temperature "
                              f"temp={temp}C util={util}% power={power}W "
                              f"score={overload_score}/24", flush=True)
                except Exception as e:
                    print(f"[watchdog] error: {e}", flush=True)
                time.sleep(5)

        class Handler(BaseHTTPRequestHandler):
            def do_GET(self):
                if self.path != "/gpu-status":
                    self.send_response(404)
                    self.end_headers()
                    return
                body = json.dumps({
                    **gpu,
                    "sustained_overload": critical,
                    "overload_score": sum(history),
                    "overload_threshold": 24,
                    "timestamp": datetime.datetime.utcnow().isoformat() + "Z",
                }, indent=2).encode()
                self.send_response(200)
                self.send_header("Content-Type", "application/json")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)
            def log_message(self, *a):
                pass

        threading.Thread(target=poll, daemon=True).start()
        print("[watchdog] started on :9090/gpu-status", flush=True)
        HTTPServer(("0.0.0.0", 9090), Handler).serve_forever()
        PYEOF
        exec python3 /tmp/watchdog.py

  # ── vLLM: gemma4:31b ──────────────────────────────────────────────────────
  vllm-gemma:
    image: vllm/vllm-openai@sha256:3a1e7f5904e1a1192a02aa0086ceaffc33985d7044c7bb25b3a43d61bdbe3ac0
    container_name: vllm-gemma
    privileged: true
    runtime: nvidia
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          memory: 60G
    env_file:
      - usr/.env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HF_HOME=/root/.cache/huggingface
    volumes:
      - /mnt/secure/.vllm-gemma:/root/.cache/huggingface
    command: >
      --model cyankiwi/gemma-4-31B-it-AWQ-4bit
      --served-model-name gemma4:31b
      --host 0.0.0.0
      --port 8000
      --kv-cache-dtype fp8
      --enable-prefix-caching
      --enable-prompt-tokens-details
      --gpu-memory-utilization 0.41
      --max-model-len 16384
      --max-num-batched-tokens 16384
      --max-num-seqs 10
      --tensor-parallel-size 1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 120s
      start_period: 600s
      retries: 20
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    networks:
      - secretai_network

  # ── vLLM: qwen3.6:27b ────────────────────────────────────────────────────
  vllm-qwen36:
    image: vllm/vllm-openai@sha256:3a1e7f5904e1a1192a02aa0086ceaffc33985d7044c7bb25b3a43d61bdbe3ac0
    container_name: vllm-qwen36
    privileged: true
    runtime: nvidia
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          memory: 60G
    env_file:
      - usr/.env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HF_HOME=/root/.cache/huggingface
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    volumes:
      - /mnt/secure/.vllm-qwen36:/root/.cache/huggingface
    command: >
      --model cyankiwi/Qwen3.6-27B-AWQ-INT4
      --served-model-name qwen3.6:27b
      --host 0.0.0.0
      --port 8001
      --quantization compressed-tensors
      --dtype bfloat16
      --kv-cache-dtype fp8
      --enable-prefix-caching
      --enable-prompt-tokens-details
      --gpu-memory-utilization 0.55
      --max-model-len 131072
      --max-num-batched-tokens 8192
      --max-num-seqs 50
      --tensor-parallel-size 1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/v1/models"]
      interval: 30s
      timeout: 120s
      start_period: 600s
      retries: 20
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    networks:
      - secretai_network
    depends_on:
      vllm-gemma:
        condition: service_healthy

networks:
  secretai_network:
    driver: bridge
    name: secretai_network

configs:
  litellm_config:
    content: |
      model_list:
        - model_name: gemma4:31b
          litellm_params:
            model: openai/gemma4:31b
            api_base: http://vllm-gemma:8000/v1
            api_key: "dummy"
            max_parallel_requests: 50

        - model_name: qwen3.6:27b
          litellm_params:
            model: openai/qwen3.6:27b
            api_base: http://vllm-qwen36:8001/v1
            api_key: "dummy"
            max_parallel_requests: 200

      router_settings:
        allowed_fails: 3
        cooldown_time: 60
        num_retries: 0

      litellm_settings:
        drop_params: true
        set_verbose: false
        request_timeout: 600

  caddyfile:
    content: |
      {
        order secret_reverse_proxy first
        log {
          output stdout
          format console
          level INFO
        }
      }

      :21434 {
        tls /etc/ssl/certs/secret_vm_app_fullchain.pem /etc/ssl/private/secret_vm_app_private.pem

        # GPU status — public, no auth required
        handle /gpu-status {
          reverse_proxy gpu-watchdog:9090
        }

        @cors_preflight method OPTIONS
        handle @cors_preflight {
          @has_origin header Origin *
          header @has_origin {
            Access-Control-Allow-Origin {header.origin}
            Access-Control-Allow-Credentials "true"
            Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD"
            Access-Control-Allow-Headers "*"
            Access-Control-Max-Age "86400"
            Vary "Origin"
          }
          respond "" 204
        }

        handle {
          @has_origin header Origin *
          header @has_origin {
            Access-Control-Allow-Origin {header.origin}
            Access-Control-Allow-Credentials "true"
            Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD"
            Access-Control-Allow-Headers "*"
            Access-Control-Expose-Headers "*"
            Vary "Origin"
          }

          secret_reverse_proxy {
            API_MASTER_KEY {env.SECRET_API_MASTER_KEY}
            secret_node {env.SECRET_NODE}
            contract_address {env.SECRET_CONTRACT}
            secret_chain_id {env.SECRET_CHAIN_ID}
            metering {env.METERING}
            metering_interval {env.METERING_INTERVAL}
            metering_url {env.METERING_URL}
            max_body_size 2097152
            token_counting_mode accurate
            max_retries 2
            retry_backoff 30s
            enable_metrics true
            metrics_path /metrics
            x402_enabled {env.X402_ENABLED}
            devportal_url {env.DEVPORTAL_URL}
            devportal_service_key {env.DEVPORTAL_SERVICE_KEY}
            x402_min_balance_usd {env.X402_MIN_BALANCE_USD}
          }

          reverse_proxy litellm-router:4000 {
            health_uri /health/liveliness
            health_interval 30s
            health_timeout 10s
            header_up Host {host}
            header_up X-Real-IP {remote_host}
            header_up X-Forwarded-Port {server_port}
            header_up X-Forwarded-Proto {scheme}
            header_up X-Forwarded-For {remote_host}
          }
        }

        header {
          -Server
          X-Content-Type-Options nosniff
          X-Frame-Options SAMEORIGIN
          X-XSS-Protection "1; mode=block"
          Referrer-Policy strict-origin-when-cross-origin
        }

        handle_errors {
          @502 expression {http.error.status_code} == 502
          @503 expression {http.error.status_code} == 503
          @504 expression {http.error.status_code} == 504
          respond @502 "LLM service temporarily unavailable" 502
          respond @503 "Service temporarily unavailable" 503
          respond @504 "Request timeout" 504
        }
      }

      https://:18800 {
        tls /etc/ssl/certs/secret_vm_app_fullchain.pem /etc/ssl/private/secret_vm_app_private.pem

        @cors_preflight method OPTIONS
        handle @cors_preflight {
          @has_origin header Origin *
          header @has_origin {
            Access-Control-Allow-Origin {header.origin}
            Access-Control-Allow-Credentials "true"
            Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD"
            Access-Control-Allow-Headers "*"
            Access-Control-Max-Age "86400"
            Vary "Origin"
          }
          respond "" 204
        }

        handle {
          @has_origin header Origin *
          header @has_origin {
            Access-Control-Allow-Origin {header.origin}
            Access-Control-Allow-Credentials "true"
            Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD"
            Access-Control-Allow-Headers "*"
            Access-Control-Expose-Headers "*"
            Vary "Origin"
          }

          secret_reverse_proxy {
            API_MASTER_KEY {env.SECRET_API_MASTER_KEY}
            secret_node {env.SECRET_NODE}
            contract_address {env.SECRET_CONTRACT}
            secret_chain_id {env.SECRET_CHAIN_ID}
            metering {env.METERING}
            metering_interval {env.METERING_INTERVAL}
            metering_url {env.METERING_URL}
            max_body_size 2097152
            token_counting_mode accurate
            max_retries 2
            retry_backoff 30s
            x402_enabled {env.X402_ENABLED}
            devportal_url {env.DEVPORTAL_URL}
            devportal_service_key {env.DEVPORTAL_SERVICE_KEY}
            x402_min_balance_usd {env.X402_MIN_BALANCE_USD}
          }

          route {
            handle_path /generate* {
              reverse_proxy tgi:80
            }
            handle_path /generate_stream* {
              reverse_proxy tgi:80
            }
            handle_path /tokenize* {
              reverse_proxy tgi:80
            }
            handle_path /v1/* {
              reverse_proxy tgi:80
            }
            handle_path /metrics {
              reverse_proxy tgi:80
            }
          }
        }

        handle_errors {
          @502 expression {http.error.status_code} == 502
          @503 expression {http.error.status_code} == 503
          @504 expression {http.error.status_code} == 504
          respond @502 "Solidity LLM (TGI) temporarily unavailable" 502
          respond @503 "Service temporarily unavailable" 503
          respond @504 "Request timeout" 504
        }
      }
