# =============================================================================
# SecretAI Docker Compose — RYTN (vLLM)
# vLLM v0.23.0 | Caddy v0.1.19 | LiteLLM router
# Models: gemma4:31b + qwen3.6:27b (AWQ / bitsandbytes int4)
#
# Architecture:
#   Caddy :21434 -> LiteLLM :4000 --> vllm-gemma  :8000  (gemma4:31b)
#                                 --> vllm-qwen36  :8001  (qwen3.6:27b)
#
# VRAM budget H100 80GB (79.18 GiB usable):
#   gemma4:31b   AWQ compressed-tensors 20.2GB weights + 7.9GB KV fp8  = ~29GB physical (42% alloc)
#   qwen3.6:27b  AWQ int4 (cyankiwi)    19.2GB weights + ~14GB KV fp8  = ~37GB physical (47% alloc)
#   -----------------------------------------
#   Total                                                               ~71GB < 79.18GB ✓
#
# qwen3.6:27b max_model_len=32768 (Mamba block=1568 tok; prefix cache requires >1568 tok shared prefix)
#
# Prefix caching enabled on both models (--enable-prefix-caching).
# Models start sequentially to avoid GPU memory profiling conflicts.
#
# Port 18800 (TGI Solidity LLM) is a separate deployment; Caddy routes only.
# =============================================================================

services:

  init:
    image: alpine:3.23.4
    container_name: sys-init
    volumes:
      - /mnt/secure:/workdir
    command: >
      sh -c "
        mkdir -p /workdir/.vllm-gemma &&
        mkdir -p /workdir/.vllm-qwen36 &&
        mkdir -p /workdir/caddy-data
      "
    restart: "no"
    networks:
      - secretai_network

  caddy:
    image: ghcr.io/scrtlabs/secret-ai-caddy:v0.1.19
    container_name: caddy-proxy
    ports:
      - "21434:21434"
      - "18800:18800"
    volumes:
      - /mnt/secure/app_cert:/etc/ssl/certs:ro
      - /mnt/secure/app_cert:/etc/ssl/private:ro
      - /mnt/secure/caddy-data:/data
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    env_file:
      - usr/.env
    environment:
      - SKIP_SSL_VALIDATION=true
      - SECRET_CHAIN_ID=secret-4
      - SECRET_CONTRACT=secret18xpp2kmkk7g8xzx24wm5zstw9tjv6g3xle2vjm
      - METERING=1
      - METERING_INTERVAL=1m
      - METERING_URL=https://secretai.scrtlabs.com
    healthcheck:
      test: ["CMD", "curl", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    user: root
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - secretai_network

  # ── LiteLLM router: single OpenAI-compatible endpoint for all models ────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-router
    command: ["--config", "/etc/litellm/config.yaml", "--port", "4000", "--num_workers", "4"]
    configs:
      - source: litellm_config
        target: /etc/litellm/config.yaml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/liveliness"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - secretai_network
    depends_on:
      vllm-gemma:
        condition: service_healthy
      vllm-qwen36:
        condition: service_healthy

  # ── vLLM: gemma4:31b ──────────────────────────────────────────────────────
  # HF model: cyankiwi/gemma-4-31B-it-AWQ-4bit (compressed-tensors, lower CUDA graph overhead)
  vllm-gemma:
    image: vllm/vllm-openai:v0.23.0
    container_name: vllm-gemma
    privileged: true
    runtime: nvidia
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          memory: 60G
    env_file:
      - usr/.env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HF_HOME=/root/.cache/huggingface
    volumes:
      - /mnt/secure/.vllm-gemma:/root/.cache/huggingface
    command: >
      --model cyankiwi/gemma-4-31B-it-AWQ-4bit
      --served-model-name gemma4:31b
      --host 0.0.0.0
      --port 8000
      --kv-cache-dtype fp8
      --enable-prefix-caching
      --enable-prompt-tokens-details
      --gpu-memory-utilization 0.42
      --max-model-len 16384
      --max-num-batched-tokens 16384
      --tensor-parallel-size 1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 120s
      start_period: 600s
      retries: 20
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    networks:
      - secretai_network

  # ── vLLM: qwen3.6:27b ────────────────────────────────────────────────────
  # HF model: cyankiwi/Qwen3.6-27B-AWQ-INT4 (AWQ 4-bit; same author as gemma4 AWQ)
  # Starts after gemma is healthy to avoid GPU memory profiling conflicts
  vllm-qwen36:
    image: vllm/vllm-openai:v0.23.0
    container_name: vllm-qwen36
    privileged: true
    runtime: nvidia
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          memory: 60G
    env_file:
      - usr/.env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HF_HOME=/root/.cache/huggingface
    volumes:
      - /mnt/secure/.vllm-qwen36:/root/.cache/huggingface
    command: >
      --model cyankiwi/Qwen3.6-27B-AWQ-INT4
      --served-model-name qwen3.6:27b
      --host 0.0.0.0
      --port 8001
      --quantization compressed-tensors
      --dtype bfloat16
      --enforce-eager
      --kv-cache-dtype fp8
      --enable-prefix-caching
      --enable-prompt-tokens-details
      --gpu-memory-utilization 0.55
      --max-model-len 32768
      --max-num-batched-tokens 8192
      --max-num-seqs 256
      --tensor-parallel-size 1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/v1/models"]
      interval: 30s
      timeout: 120s
      start_period: 600s
      retries: 20
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    networks:
      - secretai_network
    depends_on:
      vllm-gemma:
        condition: service_healthy

networks:
  secretai_network:
    driver: bridge
    name: secretai_network

configs:
  litellm_config:
    content: |
      model_list:
        - model_name: gemma4:31b
          litellm_params:
            model: openai/gemma4:31b
            api_base: http://vllm-gemma:8000/v1
            api_key: "dummy"
        - model_name: qwen3.6:27b
          litellm_params:
            model: openai/qwen3.6:27b
            api_base: http://vllm-qwen36:8001/v1
            api_key: "dummy"

      litellm_settings:
        drop_params: true
        set_verbose: false
        request_timeout: 600

  caddyfile:
    content: |
      {
        order secret_reverse_proxy first
        log {
          output stdout
          format console
          level INFO
        }
      }

      :21434 {
        tls /etc/ssl/certs/secret_vm_app_fullchain.pem /etc/ssl/private/secret_vm_app_private.pem

        @cors_preflight method OPTIONS
        handle @cors_preflight {
          @has_origin header Origin *
          header @has_origin {
            Access-Control-Allow-Origin {header.origin}
            Access-Control-Allow-Credentials "true"
            Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD"
            Access-Control-Allow-Headers "*"
            Access-Control-Max-Age "86400"
            Vary "Origin"
          }
          respond "" 204
        }

        handle {
          @has_origin header Origin *
          header @has_origin {
            Access-Control-Allow-Origin {header.origin}
            Access-Control-Allow-Credentials "true"
            Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD"
            Access-Control-Allow-Headers "*"
            Access-Control-Expose-Headers "*"
            Vary "Origin"
          }

          secret_reverse_proxy {
            API_MASTER_KEY {env.SECRET_API_MASTER_KEY}
            secret_node {env.SECRET_NODE}
            contract_address {env.SECRET_CONTRACT}
            secret_chain_id {env.SECRET_CHAIN_ID}
            metering {env.METERING}
            metering_interval {env.METERING_INTERVAL}
            metering_url {env.METERING_URL}
            max_body_size 2097152
            token_counting_mode accurate
            max_retries 5
            retry_backoff 300s
            enable_metrics true
            metrics_path /metrics
            x402_enabled {env.X402_ENABLED}
            devportal_url {env.DEVPORTAL_URL}
            devportal_service_key {env.DEVPORTAL_SERVICE_KEY}
            x402_min_balance_usd {env.X402_MIN_BALANCE_USD}
          }

          reverse_proxy litellm-router:4000 {
            health_uri /health/liveliness
            health_interval 30s
            health_timeout 10s
            header_up Host {host}
            header_up X-Real-IP {remote_host}
            header_up X-Forwarded-Port {server_port}
            header_up X-Forwarded-Proto {scheme}
            header_up X-Forwarded-For {remote_host}
          }
        }

        header {
          -Server
          X-Content-Type-Options nosniff
          X-Frame-Options SAMEORIGIN
          X-XSS-Protection "1; mode=block"
          Referrer-Policy strict-origin-when-cross-origin
        }

        handle_errors {
          @502 expression {http.error.status_code} == 502
          @503 expression {http.error.status_code} == 503
          @504 expression {http.error.status_code} == 504
          respond @502 "LLM service temporarily unavailable" 502
          respond @503 "Service temporarily unavailable" 503
          respond @504 "Request timeout" 504
        }
      }

      https://:18800 {
        tls /etc/ssl/certs/secret_vm_app_fullchain.pem /etc/ssl/private/secret_vm_app_private.pem

        @cors_preflight method OPTIONS
        handle @cors_preflight {
          @has_origin header Origin *
          header @has_origin {
            Access-Control-Allow-Origin {header.origin}
            Access-Control-Allow-Credentials "true"
            Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD"
            Access-Control-Allow-Headers "*"
            Access-Control-Max-Age "86400"
            Vary "Origin"
          }
          respond "" 204
        }

        handle {
          @has_origin header Origin *
          header @has_origin {
            Access-Control-Allow-Origin {header.origin}
            Access-Control-Allow-Credentials "true"
            Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD"
            Access-Control-Allow-Headers "*"
            Access-Control-Expose-Headers "*"
            Vary "Origin"
          }

          secret_reverse_proxy {
            API_MASTER_KEY {env.SECRET_API_MASTER_KEY}
            secret_node {env.SECRET_NODE}
            contract_address {env.SECRET_CONTRACT}
            secret_chain_id {env.SECRET_CHAIN_ID}
            metering {env.METERING}
            metering_interval {env.METERING_INTERVAL}
            metering_url {env.METERING_URL}
            max_body_size 2097152
            token_counting_mode accurate
            max_retries 5
            retry_backoff 300s
            x402_enabled {env.X402_ENABLED}
            devportal_url {env.DEVPORTAL_URL}
            devportal_service_key {env.DEVPORTAL_SERVICE_KEY}
            x402_min_balance_usd {env.X402_MIN_BALANCE_USD}
          }

          route {
            handle_path /generate* {
              reverse_proxy tgi:80
            }
            handle_path /generate_stream* {
              reverse_proxy tgi:80
            }
            handle_path /tokenize* {
              reverse_proxy tgi:80
            }
            handle_path /v1/* {
              reverse_proxy tgi:80
            }
            handle_path /metrics {
              reverse_proxy tgi:80
            }
          }
        }

        handle_errors {
          @502 expression {http.error.status_code} == 502
          @503 expression {http.error.status_code} == 503
          @504 expression {http.error.status_code} == 504
          respond @502 "Solidity LLM (TGI) temporarily unavailable" 502
          respond @503 "Service temporarily unavailable" 503
          respond @504 "Request timeout" 504
        }
      }
