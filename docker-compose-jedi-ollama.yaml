# =============================================================================
# SecretAI Docker Compose — JEDI (Ollama 0.20.7)
# Ollama | Caddy v0.1.17 | STT | TTS
# Archived from production: https://secretai-jedi.scrtlabs.com:29343/docker-compose
# =============================================================================

x-gpu: &gpu
  gpus: all

services:

  init:
    image: alpine@sha256:4d889c14e7d5a73929ab00be2ef8ff22437e7cbc545931e52554a7b00e123d8b
    container_name: sys-init
    volumes:
      - /mnt/secure:/workdir
    command: >
      sh -c "
        mkdir -p /workdir/stt-models &&
        mkdir -p /workdir/stt-logs &&
        mkdir -p /workdir/tts-data/hf &&
        mkdir -p /workdir/tts-data/cache &&
        mkdir -p /workdir/tts-models &&
        mkdir -p /workdir/tts-logs &&
        chmod -R 777 /workdir/tts-logs /workdir/tts-models /workdir/tts-data /workdir/stt-logs /workdir/stt-models
      "
    restart: "no"
    networks:
      - secretai_network

  caddy:
    image: ghcr.io/scrtlabs/secret-ai-caddy@sha256:413b5781c0d915a820bd0cb04dab03f3055aafc323bf979ae38fe9c5a0a17f19
    container_name: caddy-proxy
    ports:
      - "21434:21434"
      - "25436:25436"
      - "25435:25435"
      - "18800:18800"
    volumes:
      - /mnt/secure/app_cert:/etc/ssl/certs:ro
      - /mnt/secure/app_cert:/etc/ssl/private:ro
      - /mnt/secure/caddy-data:/data
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    env_file:
      - usr/.env
    environment:
      - SKIP_SSL_VALIDATION=true
      - SECRET_CHAIN_ID=secret-4
      - SECRET_CONTRACT=secret18xpp2kmkk7g8xzx24wm5zstw9tjv6g3xle2vjm
      - METERING=1
      - METERING_INTERVAL=1m
      - METERING_URL=https://secretai.scrtlabs.com
      - BLOCK_URLS=21434/api/pull
    healthcheck:
      test: ["CMD", "curl", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    user: root
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - secretai_network

  ollama-init:
    image: alpine@sha256:4d889c14e7d5a73929ab00be2ef8ff22437e7cbc545931e52554a7b00e123d8b
    container_name: ollama-llm-init
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - /mnt/secure/.ollama:/root/.ollama
    command: >
      sh -c "
        set -e
        apk add --no-cache curl jq 2>/dev/null || true
        MODELS='gpt-oss:120b'
        echo '============================================'
        echo 'Starting Ollama Model Management'
        echo 'Ollama version: 0.20.7'
        echo '============================================'
        echo 'Fetching currently available models...'
        EXISTING_MODELS=$$(curl -s http://ollama:11434/api/tags | jq -r '.models[].name' 2>/dev/null || echo '')
        echo \"Current models: $$EXISTING_MODELS\"
        echo ''
        echo '============================================'
        echo 'Phase 1: Checking and pulling missing models'
        echo '============================================'
        for MODEL in $$MODELS; do
          echo \"Checking model: $$MODEL\"
          if echo \"$$EXISTING_MODELS\" | grep -q \"$$MODEL\"; then
            echo \"  ✓ Model $$MODEL already exists, skipping pull\"
          else
            echo \"  → Pulling model: $$MODEL (this may take a while)\"
            curl -X POST http://ollama:11434/api/pull -H 'Content-Type: application/json' -d '{\"name\": \"'\"$$MODEL\"'\"}' --progress-bar
            echo \"\"
            echo \"  ✓ Pull complete for $$MODEL\"
          fi
          echo ''
        done
        echo '============================================'
        echo 'Phase 2: Loading and pinning models in VRAM'
        echo '============================================'
        LOAD_FAILURES=0
        for MODEL in $$MODELS; do
          echo \"Loading model into VRAM: $$MODEL\"
          echo \"  Sending empty prompt with keep_alive:-1 to pin model...\"
          RESPONSE=$$(curl -s -w '\n%{http_code}' -X POST http://ollama:11434/api/generate \
            -H 'Content-Type: application/json' \
            -d '{
              \"model\": \"'\"$$MODEL\"'\",
              \"prompt\": \"\",
              \"keep_alive\": -1,
              \"stream\": false
            }')
          HTTP_CODE=$$(echo \"$$RESPONSE\" | tail -1)
          BODY=$$(echo \"$$RESPONSE\" | sed '$d')
          if [ \"$$HTTP_CODE\" = \"200\" ]; then
            echo \"  ✓ Model $$MODEL loaded and pinned (keep_alive=-1)\"
          else
            echo \"  ✗ Failed to load $$MODEL (HTTP $$HTTP_CODE)\"
            echo \"  Response: $$BODY\"
            LOAD_FAILURES=$$((LOAD_FAILURES + 1))
          fi
          echo \"  Waiting 10s for VRAM allocation to settle...\"
          sleep 10
          echo ''
        done
        echo '============================================'
        echo 'Phase 3: Verifying GPU residency via /api/ps'
        echo '============================================'
        PS_OUTPUT=$$(curl -s http://ollama:11434/api/ps)
        LOADED_COUNT=$$(echo \"$$PS_OUTPUT\" | jq '.models | length' 2>/dev/null || echo '0')
        EXPECTED_COUNT=$$(echo $$MODELS | wc -w | tr -d ' ')
        echo \"Models loaded: $$LOADED_COUNT / $$EXPECTED_COUNT expected\"
        echo ''
        echo \"$$PS_OUTPUT\" | jq -r '.models[] | \"  Model: \(.name)\" + \"\n    Total size: \" + (.size / 1073741824 * 100 | floor / 100 | tostring) + \" GB\" + \"\n    VRAM size:  \" + (.size_vram / 1073741824 * 100 | floor / 100 | tostring) + \" GB\" + \"\n    Expires:    \" + (if .expires_at then .expires_at else \"NEVER (pinned)\" end)' 2>/dev/null || echo '  (Could not parse /api/ps response)'
        echo ''
        if [ \"$$LOAD_FAILURES\" -gt 0 ]; then
          echo \"⚠ WARNING: $$LOAD_FAILURES model(s) failed to load.\"
          echo '  Check VRAM capacity and model availability.'
          exit 1
        fi
        if [ \"$$LOADED_COUNT\" -lt \"$$EXPECTED_COUNT\" ]; then
          echo \"⚠ WARNING: Only $$LOADED_COUNT of $$EXPECTED_COUNT models are loaded.\"
          exit 1
        fi
        echo '============================================'
        echo '✓ All models loaded and pinned successfully!'
        echo '============================================'
      "
    restart: "no"
    networks:
      - secretai_network

  ollama:
    image: ollama/ollama@sha256:1ead6b1b79e6c72c32fd15796fcdeec1635b253f7d506e889c76e44284e41b57
    container_name: ollama-llm
    privileged: true
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          memory: 160G
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
      - OLLAMA_KEEP_ALIVE=-1
      - OLLAMA_MAX_LOADED_MODELS=5
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_LOAD_TIMEOUT=600
      - OLLAMA_NO_CLOUD=1
      - OLLAMA_DEBUG=1
    volumes:
      - /mnt/secure/.ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    networks:
      - secretai_network

  stt_service:
    image: ghcr.io/scrtlabs/secret-ai-stt-tts:v0.0.8
    container_name: secretai-stt-service
    privileged: true
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - WHISPER_MODEL=large-v3
      - WHISPER_COMPUTE_TYPE=float16
      - WHISPER_DEVICE=cuda
      - CHUNK_DURATION=2.0
      - SAMPLE_RATE=16000
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
        limits:
          memory: 4G
    volumes:
      - /mnt/secure/stt-models:/app/models
      - /mnt/secure/stt-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - secretai_network
    labels:
      - "com.secretai.service=stt"
      - "com.secretai.version=1.1.0"
    depends_on:
      init:
        condition: service_completed_successfully

  tts_service:
    image: ghcr.io/remsky/kokoro-fastapi-gpu:latest
    container_name: secretai-kokoro-tts
    restart: unless-stopped
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      HF_HOME: /data/hf
      TRANSFORMERS_CACHE: /data/hf/transformers
      XDG_CACHE_HOME: /data/.cache
      PORT: "8880"
      PYTHONUNBUFFERED: "1"
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
        limits:
          memory: 4G
    volumes:
      - /mnt/secure/tts-data/hf:/data/hf
      - /mnt/secure/tts-data/cache:/data/.cache
      - /mnt/secure/tts-models:/models
      - /mnt/secure/tts-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8880/v1/test"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - secretai_network
    labels:
      - "com.secretai.service=tts"
      - "com.secretai.provider=kokoro"
    depends_on:
      init:
        condition: service_completed_successfully

networks:
  secretai_network:
    driver: bridge
    name: secretai_network

volumes:
  tgi-models:
    driver: local

configs:
  caddyfile:
    content: |
      {
        debug
        order secret_reverse_proxy first
        log {
          output stdout
          format console
          level DEBUG
        }
      }

      :25436 {
        tls /etc/ssl/certs/secret_vm_app_fullchain.pem /etc/ssl/private/secret_vm_app_private.pem

        @cors_preflight method OPTIONS
        handle @cors_preflight {
          @has_origin header Origin *
          header @has_origin {
            Access-Control-Allow-Origin {header.origin}
            Access-Control-Allow-Credentials "true"
            Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD"
            Access-Control-Allow-Headers "Content-Type, Authorization, X-API-Key, Origin, Accept, X-Requested-With"
            Access-Control-Max-Age "86400"
            Vary "Origin"
          }
          respond "" 204
        }

        handle {
          @has_origin header Origin *
          header @has_origin {
            Access-Control-Allow-Origin {header.origin}
            Access-Control-Allow-Credentials "true"
            Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD"
            Access-Control-Allow-Headers "Content-Type, Authorization, X-API-Key, Origin, Accept, X-Requested-With"
            Access-Control-Expose-Headers "*"
            Vary "Origin"
          }

          secret_reverse_proxy {
            API_MASTER_KEY {env.SECRET_API_MASTER_KEY}
            secret_node {env.SECRET_NODE}
            contract_address {env.SECRET_CONTRACT}
            secret_chain_id {env.SECRET_CHAIN_ID}
            metering {env.METERING}
            metering_interval {env.METERING_INTERVAL}
            metering_url {env.METERING_URL}
            max_body_size 2097152
            token_counting_mode accurate
            max_retries 5
            retry_backoff 300s
            enable_metrics true
            metrics_path /metrics
          }

          reverse_proxy secretai-stt-service:8001 {
            health_uri /healthz
            health_interval 30s
            health_timeout 10s
            header_up Host {host}
            header_up X-Real-IP {remote_host}
            header_up X-Forwarded-Port {server_port}
          }
        }

        handle_errors {
          @502 expression {http.error.status_code} == 502
          @503 expression {http.error.status_code} == 503
          @504 expression {http.error.status_code} == 504
          respond @502 "Service temporarily unavailable - secretai-stt-service not ready" 502
          respond @503 "Service temporarily unavailable - please try again" 503
          respond @504 "Service timeout - request took too long" 504
        }
      }

      :25435 {
        tls /etc/ssl/certs/secret_vm_app_fullchain.pem /etc/ssl/private/secret_vm_app_private.pem

        @cors_preflight method OPTIONS
        handle @cors_preflight {
          @has_origin header Origin *
          header @has_origin {
            Access-Control-Allow-Origin {header.origin}
            Access-Control-Allow-Credentials "true"
            Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD"
            Access-Control-Allow-Headers "Content-Type, Authorization, X-API-Key, Origin, Accept, X-Requested-With"
            Access-Control-Max-Age "86400"
            Vary "Origin"
          }
          respond "" 204
        }

        handle {
          @has_origin header Origin *
          header @has_origin {
            Access-Control-Allow-Origin {header.origin}
            Access-Control-Allow-Credentials "true"
            Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD"
            Access-Control-Allow-Headers "Content-Type, Authorization, X-API-Key, Origin, Accept, X-Requested-With"
            Access-Control-Expose-Headers "*"
            Vary "Origin"
          }

          secret_reverse_proxy {
            API_MASTER_KEY {env.SECRET_API_MASTER_KEY}
            secret_node {env.SECRET_NODE}
            contract_address {env.SECRET_CONTRACT}
            secret_chain_id {env.SECRET_CHAIN_ID}
            metering {env.METERING}
            metering_interval {env.METERING_INTERVAL}
            metering_url {env.METERING_URL}
            max_body_size 2097152
            token_counting_mode accurate
            max_retries 5
            retry_backoff 300s
            enable_metrics true
            metrics_path /metrics
          }

          reverse_proxy secretai-kokoro-tts:8880 {
            health_uri /v1/test
            health_interval 30s
            health_timeout 10s
            header_up Host {host}
            header_up X-Real-IP {remote_host}
            header_up X-Forwarded-Port {server_port}
          }
        }

        handle_errors {
          @502 expression {http.error.status_code} == 502
          @503 expression {http.error.status_code} == 503
          @504 expression {http.error.status_code} == 504
          respond @502 "Service temporarily unavailable - secretai-kokoro-tts not ready" 502
          respond @503 "Service temporarily unavailable - please try again" 503
          respond @504 "Service timeout - request took too long" 504
        }
      }

      :21434 {
        tls /etc/ssl/certs/secret_vm_app_fullchain.pem /etc/ssl/private/secret_vm_app_private.pem

        @cors_preflight method OPTIONS
        handle @cors_preflight {
          @has_origin header Origin *
          header @has_origin {
            Access-Control-Allow-Origin {header.origin}
            Access-Control-Allow-Credentials "true"
            Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD"
            Access-Control-Allow-Headers "Content-Type, Authorization, X-API-Key, Origin, Accept, X-Requested-With"
            Access-Control-Max-Age "86400"
            Vary "Origin"
          }
          respond "" 204
        }

        handle {
          @has_origin header Origin *
          header @has_origin {
            Access-Control-Allow-Origin {header.origin}
            Access-Control-Allow-Credentials "true"
            Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD"
            Access-Control-Allow-Headers "Content-Type, Authorization, X-API-Key, Origin, Accept, X-Requested-With"
            Access-Control-Expose-Headers "*"
            Vary "Origin"
          }

          secret_reverse_proxy {
            API_MASTER_KEY {env.SECRET_API_MASTER_KEY}
            secret_node {env.SECRET_NODE}
            contract_address {env.SECRET_CONTRACT}
            secret_chain_id {env.SECRET_CHAIN_ID}
            metering {env.METERING}
            metering_interval {env.METERING_INTERVAL}
            metering_url {env.METERING_URL}
            max_body_size 2097152
            token_counting_mode accurate
            max_retries 5
            retry_backoff 300s
            enable_metrics true
            metrics_path /metrics
            x402_enabled {env.X402_ENABLED}
            devportal_url {env.DEVPORTAL_URL}
            devportal_service_key {env.DEVPORTAL_SERVICE_KEY}
            x402_min_balance_usd {env.X402_MIN_BALANCE_USD}
          }

          reverse_proxy ollama-llm:11434 {
            health_uri /
            health_interval 30s
            health_timeout 10s
            header_up Host {host}
            header_up X-Real-IP {remote_host}
            header_up X-Forwarded-Port {server_port}
          }
        }

        handle_errors {
          @502 expression {http.error.status_code} == 502
          @503 expression {http.error.status_code} == 503
          @504 expression {http.error.status_code} == 504
          respond @502 "Service temporarily unavailable - ollama-llm not ready" 502
          respond @503 "Service temporarily unavailable - please try again" 503
          respond @504 "Service timeout - request took too long" 504
        }
      }

      https://:18800 {
        tls /etc/ssl/certs/secret_vm_app_fullchain.pem /etc/ssl/private/secret_vm_app_private.pem

        @cors_preflight method OPTIONS
        handle @cors_preflight {
          @has_origin header Origin *
          header @has_origin {
            Access-Control-Allow-Origin {header.origin}
            Access-Control-Allow-Credentials "true"
            Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD"
            Access-Control-Allow-Headers "Content-Type, Authorization, X-API-Key, Origin, Accept, X-Requested-With"
            Access-Control-Max-Age "86400"
            Vary "Origin"
          }
          respond "" 204
        }

        handle {
          @has_origin header Origin *
          header @has_origin {
            Access-Control-Allow-Origin {header.origin}
            Access-Control-Allow-Credentials "true"
            Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD"
            Access-Control-Allow-Headers "Content-Type, Authorization, X-API-Key, Origin, Accept, X-Requested-With"
            Access-Control-Expose-Headers "*"
            Vary "Origin"
          }

          secret_reverse_proxy {
            API_MASTER_KEY {env.SECRET_API_MASTER_KEY}
            secret_node {env.SECRET_NODE}
            contract_address {env.SECRET_CONTRACT}
            secret_chain_id {env.SECRET_CHAIN_ID}
            metering {env.METERING}
            metering_interval {env.METERING_INTERVAL}
            metering_url {env.METERING_URL}
            max_body_size 2097152
            token_counting_mode accurate
            max_retries 5
            retry_backoff 300s
            enable_metrics true
            metrics_path /metrics
          }

          route {
            handle_path /generate* {
              reverse_proxy tgi:80
            }
            handle_path /generate_stream* {
              reverse_proxy tgi:80
            }
            handle_path /tokenize* {
              reverse_proxy tgi:80
            }
            handle_path /v1/* {
              reverse_proxy tgi:80
            }
            handle_path /metrics {
              reverse_proxy tgi:80
            }
          }
        }

        handle_errors {
          @502 expression {http.error.status_code} == 502
          @503 expression {http.error.status_code} == 503
          @504 expression {http.error.status_code} == 504
          respond @502 "Service temporarily unavailable - tgi not ready" 502
          respond @503 "Service temporarily unavailable - please try again" 503
          respond @504 "Service timeout - request took too long" 504
        }
      }
